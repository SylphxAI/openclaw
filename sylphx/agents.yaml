defaults:
  region: lhr
  node_options: --max-old-space-size=4096 --dns-result-order=ipv4first
  model:
    primary: minimax/MiniMax-M3
    fallbacks:
  providers:
    minimax:
      baseUrl: https://api.minimax.io/anthropic
      apiKey: ${MINIMAX_API_KEY}
      api: anthropic-messages
      models:
      - id: MiniMax-M3
        name: MiniMax M3
        reasoning: false
        input:
        - text
        contextWindow: 1000000
        maxTokens: 8192
    zai:
      baseUrl: https://api.z.ai/api/coding/paas/v4
      models:
      - id: glm-5.1
        name: GLM 5.1
        api: openai-completions
        reasoning: true
        input:
        - text
        contextWindow: 202752
        maxTokens: 16384
      - id: glm-5.2
        name: GLM 5.2
        api: openai-completions
        reasoning: true
        input:
        - text
        contextWindow: 202752
        maxTokens: 16384
      - id: glm-5
        name: GLM 5
        api: openai-completions
        reasoning: true
        input:
        - text
        contextWindow: 202752
        maxTokens: 16384
      - id: glm-5-turbo
        name: GLM 5 Turbo
        api: openai-completions
        reasoning: true
        input:
        - text
        contextWindow: 202752
        maxTokens: 16384
    sylphx:
      baseUrl: https://api.sylphx.ai/v1
      timeoutSeconds: 600
      models:
      - id: executor
        name: Sylphx Executor
        api: openai-responses
        reasoning: true
        input:
        - text
        - image
        contextWindow: 200000
        maxTokens: 64000
      - id: claude-sonnet-4-6
        name: Claude Sonnet 4.6
        api: openai-responses
        reasoning: true
        input:
        - text
        - image
        contextWindow: 200000
        maxTokens: 64000
    anthropic:
      baseUrl: https://api.sylphx.ai/v1
      timeoutSeconds: 600
      models:
      - id: claude-sonnet-4-6
        name: Claude Sonnet 4.6
        api: openai-responses
        reasoning: true
        input:
        - text
        - image
        contextWindow: 200000
        maxTokens: 64000
deploy:
  domain: claw.sylphx.com
  data_root: /data/volumes
  compose_dir: /data/openclaw
  docker_group: '988'
regions:
